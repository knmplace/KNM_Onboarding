# ADOB — Local n8n Docker Compose
#
# This file is generated by deploy.sh when you choose "install n8n locally".
# It is also kept here as a reference for manual use or re-deployment.
#
# Usage (after deploy.sh has run):
#   docker compose -f infra/docker-compose.n8n.yml up -d
#
# All variable values are filled in by deploy.sh and written to:
#   infra/.n8n.env  (chmod 600 — never commit this file)
#
# To start n8n manually without deploy.sh:
#   1. Copy infra/.n8n.env.example to infra/.n8n.env
#   2. Fill in the values
#   3. Run: docker compose -f infra/docker-compose.n8n.yml up -d

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    env_file:
      - .n8n.env
    environment:
      # Basic auth (set in .n8n.env)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASS}
      # Encryption key (set in .n8n.env)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Enable public API
      - N8N_PUBLIC_API_SWAGGERUI_DISABLED=false
      # Webhook URL (set to your server's public/LAN address)
      - WEBHOOK_URL=${N8N_WEBHOOK_BASE_URL:-http://localhost:5678/}
      # Timezone
      - GENERIC_TIMEZONE=${TZ:-America/New_York}
      - TZ=${TZ:-America/New_York}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  n8n_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/n8n-data
